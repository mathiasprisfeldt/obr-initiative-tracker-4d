services:
    backend:
        build:
            context: ..
            dockerfile: backend/Dockerfile
        ports:
            - "3001:3001"
        environment:
            DATABASE_CONNECTION_STRING: Server=db,1433;Database=obr-initiative-tracker-4d;User Id=sa;Password=Tracker@123;TrustServerCertificate=true;Encrypt=false
        depends_on:
            db:
                condition: service_healthy
        restart: unless-stopped

    db:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
            - "1433:1433"
        volumes:
            - mssqldata:/var/opt/mssql
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "Tracker@123"
        healthcheck:
            test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

volumes:
    mssqldata:
