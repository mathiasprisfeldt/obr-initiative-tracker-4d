name: Deploy client

on:
  push:
    branches:
      - main
    tags:
      - release/*
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: repo-main

      - name: Find latest release tag (release/x.x.x)
        id: find_release_tag
        working-directory: repo-main
        shell: bash
        run: |
          # If triggered by a release tag, use it directly
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == release/* ]]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Otherwise, discover the latest release tag
          git fetch --tags --force
          tag=$(git for-each-ref --format="%(refname:short)" --sort=-version:refname refs/tags/release/* | head -n1)
          if [ -z "$tag" ]; then
            echo "No tags matching release/* were found" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout latest release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find_release_tag.outputs.release_tag }}
          path: repo-prod

      - name: Set up Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: |
            **/yarn.lock

      - name: Compute version strings
        id: version
        working-directory: repo-main
        shell: bash
        run: |
          tag="${{ steps.find_release_tag.outputs.release_tag }}"
          version="${tag#release/}"
          echo "prod_version=$version" >> "$GITHUB_OUTPUT"
          echo "test_version=$version.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "### Build versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Prod:** $version" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test:** $version.${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Build prod
        working-directory: repo-prod
        env:
          VITE_BUILD_VERSION: ${{ steps.version.outputs.prod_version }}
        run: |
          yarn install --immutable
          yarn workspace obr-initiative-tracker-4d build-prod
          cd client
          rm ./dist/manifest.test.json
          mv ./dist/manifest.prod.json ./dist/manifest.json
          jq --arg v "$VITE_BUILD_VERSION" '.version = $v' ./dist/manifest.json > ./dist/manifest.tmp && mv ./dist/manifest.tmp ./dist/manifest.json
          mkdir -p ../../site
          cp -R ./dist/* ../../site

      - name: Build test
        working-directory: repo-main
        env:
          VITE_BUILD_VERSION: ${{ steps.version.outputs.test_version }}
        run: |
          yarn install --immutable
          yarn workspace obr-initiative-tracker-4d build-test
          cd client
          rm ./dist/manifest.prod.json
          mv ./dist/manifest.test.json ./dist/manifest.json
          jq --arg v "$VITE_BUILD_VERSION" '.version = $v' ./dist/manifest.json > ./dist/manifest.tmp && mv ./dist/manifest.tmp ./dist/manifest.json
          mkdir -p ../../site/test
          cp -R ./dist/* ../../site/test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload combined artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
