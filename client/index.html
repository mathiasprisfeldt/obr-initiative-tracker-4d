<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OBR Initiative Tracker - Dev</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #1e1e2e;
                color: #cdd6f4;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
            .container {
                text-align: center;
            }
            h1 {
                font-size: 1.4rem;
                margin-bottom: 0.4rem;
                color: #cba6f7;
            }
            p {
                font-size: 0.85rem;
                color: #6c7086;
                margin-bottom: 2rem;
            }
            .links {
                display: flex;
                gap: 1rem;
                justify-content: center;
            }
            a {
                display: block;
                padding: 1.2rem 2rem;
                background: #313244;
                border: 1px solid #45475a;
                border-radius: 12px;
                color: #cdd6f4;
                text-decoration: none;
                font-size: 1rem;
                font-weight: 500;
                transition:
                    background 0.15s,
                    border-color 0.15s;
            }
            a:hover {
                background: #45475a;
                border-color: #cba6f7;
            }
            a small {
                display: block;
                margin-top: 0.3rem;
                font-size: 0.75rem;
                color: #6c7086;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="links">
                <a href="src/admin/index.html">
                    Admin
                    <small>GM controls &amp; settings</small>
                </a>
                <a href="src/tracker/index.html">
                    Tracker
                    <small>Player-facing overlay</small>
                </a>
            </div>
        </div>
    </body>
</html>
